version: 1

profiles:
  clawhub:
    scanners:
      - skillspector
      - virustotal
      - clawscan-static
    judge:
      command: >-
        codex exec --cd {{ workspace }}
        --model gpt-5.5
        --sandbox read-only
        --skip-git-repo-check
        --ignore-user-config
        -c approval_policy=never
        -c model_reasoning_effort=high
        -c service_tier=fast
        -c 'shell_environment_policy.inherit="core"'
        -c shell_environment_policy.ignore_default_excludes=false
        --output-schema {{ output_schema:clawhub/output.schema.json }}
        --output-last-message {{ output }}
        --ephemeral
        --json
        - < {{ prompt:clawhub/prompt.md }}
      requiredEnv:
        - OPENAI_API_KEY

  skills-sh:
    # Gen Agent Trust Hub runs on skills.sh skills, but is omitted here
    # because Gen does not provide a local CLI for ClawScan to invoke.
    scanners:
      - socket
      - snyk
