version: 1

profiles:
  clawhub:
    scanners:
      - skillspector
      - virustotal
      - clawscan-static
    sandbox:
      env:
        - OPENAI_API_KEY
        - CODEX_API_KEY
        - VIRUSTOTAL_API_KEY
    judge:
      command: >-
        codex exec --cd {{ workspace }}
        --model gpt-5.5
        --sandbox read-only
        --skip-git-repo-check
        --ignore-user-config
        -c approval_policy=never
        -c model_reasoning_effort=high
        -c service_tier=fast
        -c 'shell_environment_policy.inherit="core"'
        -c shell_environment_policy.ignore_default_excludes=false
        --output-schema {{ output_schema:output.schema.json }}
        --output-last-message {{ output }}
        --ephemeral
        --json
        - < {{ prompt:prompt.md }}
