name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'pe/**'

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          unformatted="$(git ls-files '*.go' | xargs gofmt -l)"
          if [ -n "$unformatted" ]; then
            echo "Go files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Test
        run: go test ./...

      - name: Build CLI
        run: go build ./cmd/clawscan
