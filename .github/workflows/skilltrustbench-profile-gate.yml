name: SkillTrustBench Profile Gate

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number containing proposals/<GHSA-ID>/clawscan.yml
        required: true
      proposal_path:
        description: Candidate config path, for example proposals/GHSA-xxxx-yyyy-zzzz/clawscan.yml
        required: true
      commit_baseline:
        description: Commit the baseline summary update back to the PR branch.
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write
  pull-requests: read

jobs:
  validate-proposal:
    name: Validate proposal shape
    runs-on: ubuntu-latest
    outputs:
      baseline_date: ${{ steps.baseline.outputs.date }}
      baseline_path: ${{ steps.baseline.outputs.path }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout pull request branch
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: gh pr checkout "$PR_NUMBER" --repo "$GITHUB_REPOSITORY"

      - name: Determine dated baseline path
        id: baseline
        run: |
          set -euo pipefail
          baseline_date="$(date -u +%F)"
          baseline_path="benchmarks/skilltrustbench-leaderboard-10pct/${baseline_date}.json"
          echo "date=$baseline_date" >>"$GITHUB_OUTPUT"
          echo "path=$baseline_path" >>"$GITHUB_OUTPUT"

      - name: Validate proposal shape
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          PROPOSAL_PATH: ${{ inputs.proposal_path }}
          BASELINE_DATE: ${{ steps.baseline.outputs.date }}
          BASELINE_PATH: ${{ steps.baseline.outputs.path }}
        run: |
          set -euo pipefail
          case "$PROPOSAL_PATH" in
            proposals/GHSA-*/clawscan.yml) ;;
            *)
              echo "proposal_path must match proposals/<GHSA-ID>/clawscan.yml" >&2
              exit 1
              ;;
          esac
          test -f "$PROPOSAL_PATH"

          base_ref="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json baseRefName --jq .baseRefName)"
          git fetch --no-tags origin "$base_ref"
          unexpected="$(
            git diff --name-only "origin/$base_ref"...HEAD |
              while IFS= read -r path; do
                case "$path" in
                  "$PROPOSAL_PATH" | \
                  internal/profiles/clawhub/clawscan.yml | \
                  internal/profiles/clawhub/prompt.md | \
                  internal/profiles/clawhub/output.schema.json | \
                  "$BASELINE_PATH")
                    ;;
                  benchmarks/skilltrustbench-leaderboard-10pct/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9].json)
                    baseline_file="${path##*/}"
                    baseline_date="${baseline_file%.json}"
                    if [[ "$baseline_date" > "$BASELINE_DATE" ]]; then
                      printf '%s\n' "$path"
                    fi
                    ;;
                  *)
                    printf '%s\n' "$path"
                    ;;
                esac
              done
          )"
          if [ -n "$unexpected" ]; then
            echo "ClawHub profile proposal PRs should contain only the proposal, non-future dated baselines, and maintainer-promoted bundled clawhub profile files." >&2
            echo "Expected baseline path for this run: $BASELINE_PATH" >&2
            echo "Stale dated baselines are removed by the update job before committing this run's baseline." >&2
            echo "Future-dated baseline files are not allowed." >&2
            echo "$unexpected" >&2
            exit 1
          fi

  run-benchmark:
    name: Run SkillTrustBench benchmark
    needs: validate-proposal
    uses: ./.github/workflows/run-clawscan-benchmark.yml
    with:
      pr_number: ${{ inputs.pr_number }}
      benchmark_id: SkillTrustBench
      ids: https://huggingface.co/datasets/cuhk-zhuque/SkillTrustBench-results/resolve/main/data/evaluation_subset_10pct.jsonl
      profile: clawhub
      config_path: ${{ inputs.proposal_path }}
      output_path: ./artifacts/skilltrustbench-candidate.json
      artifact_name: skilltrustbench-candidate
      sandbox: docker
    secrets: inherit

  update-baseline:
    name: Update accepted baseline summary
    needs:
      - validate-proposal
      - run-benchmark
    runs-on: ubuntu-latest
    env:
      BASELINE_DATE: ${{ needs.validate-proposal.outputs.baseline_date }}
      BASELINE_PATH: ${{ needs.validate-proposal.outputs.baseline_path }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout pull request branch
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: gh pr checkout "$PR_NUMBER" --repo "$GITHUB_REPOSITORY"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download benchmark artifact
        uses: actions/download-artifact@v4
        with:
          name: skilltrustbench-candidate
          path: ./downloaded-artifact

      - name: Update baseline summary
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          PROPOSAL_PATH: ${{ inputs.proposal_path }}
          WORKFLOW_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          artifact="$(
            find ./downloaded-artifact -type f \( -name 'skilltrustbench-candidate.json' -o -name 'clawscan-benchmark.json' \) |
              head -n 1
          )"
          if [ -z "$artifact" ]; then
            echo "Downloaded artifact did not include a benchmark JSON file." >&2
            find ./downloaded-artifact -type f >&2 || true
            exit 1
          fi

          base_ref="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json baseRefName --jq .baseRefName)"
          git fetch --no-tags origin "$base_ref"
          git diff --name-only "origin/$base_ref"...HEAD -- 'benchmarks/skilltrustbench-leaderboard-10pct/*.json' |
            while IFS= read -r path; do
              if [ "$path" = "$BASELINE_PATH" ]; then
                continue
              fi
              case "$path" in
                benchmarks/skilltrustbench-leaderboard-10pct/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9].json)
                  if git cat-file -e "origin/$base_ref:$path" 2>/dev/null; then
                    git checkout "origin/$base_ref" -- "$path"
                  else
                    git rm -f --ignore-unmatch "$path"
                    rm -f "$path"
                  fi
                  ;;
              esac
            done

          go run ./scripts/update-skilltrustbench-baseline \
            --artifact "$artifact" \
            --output "$BASELINE_PATH" \
            --profile clawhub \
            --profile-source "$PROPOSAL_PATH" \
            --subset-case-ids-sha256 903a036e4b7b16ee28e22d5d9db57a00b3764cfe41e43144acad67921e5196c2 \
            --workflow-url "$WORKFLOW_URL"
          {
            echo "## ClawHub SkillTrustBench profile gate"
            echo
            echo "- Baseline: \`$BASELINE_PATH\`"
            echo "- Artifact: \`skilltrustbench-candidate\`"
            echo "- Workflow: $WORKFLOW_URL"
          } >>"$GITHUB_STEP_SUMMARY"

      - name: Commit baseline update
        if: ${{ inputs.commit_baseline == 'true' }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A benchmarks/skilltrustbench-leaderboard-10pct
          if git diff --cached --quiet; then
            echo "SkillTrustBench baseline already up to date."
            exit 0
          fi
          git commit -m "chore: update clawhub SkillTrustBench baseline"
          git push
