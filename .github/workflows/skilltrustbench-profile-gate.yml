name: SkillTrustBench Profile Gate

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number containing proposals/<GHSA-ID>/clawscan.yml
        required: true
      proposal_path:
        description: Candidate config path, for example proposals/GHSA-xxxx-yyyy-zzzz/clawscan.yml
        required: true
      limit:
        description: SkillTrustBench row limit. Use 0 for the full benchmark.
        required: false
        default: "0"
      commit_readme:
        description: Commit the README benchmark block update back to the PR branch.
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write
  pull-requests: read

jobs:
  validate-proposal:
    name: Validate proposal shape
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout pull request branch
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: gh pr checkout "$PR_NUMBER" --repo "$GITHUB_REPOSITORY"

      - name: Validate proposal shape
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          PROPOSAL_PATH: ${{ inputs.proposal_path }}
        run: |
          set -euo pipefail
          case "$PROPOSAL_PATH" in
            proposals/GHSA-*/clawscan.yml) ;;
            *)
              echo "proposal_path must match proposals/<GHSA-ID>/clawscan.yml" >&2
              exit 1
              ;;
          esac
          test -f "$PROPOSAL_PATH"

          base_ref="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json baseRefName --jq .baseRefName)"
          git fetch --no-tags origin "$base_ref"
          unexpected="$(
            git diff --name-only "origin/$base_ref"...HEAD |
              grep -Fxv "$PROPOSAL_PATH" |
              grep -Fxv "README.md" || true
          )"
          if [ -n "$unexpected" ]; then
            echo "ClawHub profile proposal PRs should contain only $PROPOSAL_PATH plus README.md after this workflow updates metrics." >&2
            echo "$unexpected" >&2
            exit 1
          fi

  run-benchmark:
    name: Run SkillTrustBench benchmark
    needs: validate-proposal
    uses: ./.github/workflows/run-clawscan-benchmark.yml
    with:
      pr_number: ${{ inputs.pr_number }}
      benchmark_id: SkillTrustBench
      profile: clawhub
      config_path: ${{ inputs.proposal_path }}
      limit: ${{ inputs.limit }}
      output_path: ./artifacts/skilltrustbench-candidate.json
      artifact_name: skilltrustbench-candidate
      install_scanners: skillspector
      install_codex: true
    secrets: inherit

  update-readme:
    name: Update README benchmark block
    needs: run-benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout pull request branch
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: gh pr checkout "$PR_NUMBER" --repo "$GITHUB_REPOSITORY"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download benchmark artifact
        uses: actions/download-artifact@v4
        with:
          name: skilltrustbench-candidate
          path: ./downloaded-artifact

      - name: Update README benchmark block
        env:
          WORKFLOW_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          artifact="$(
            find ./downloaded-artifact -type f \( -name 'skilltrustbench-candidate.json' -o -name 'clawscan-benchmark.json' \) |
              head -n 1
          )"
          if [ -z "$artifact" ]; then
            echo "Downloaded artifact did not include a benchmark JSON file." >&2
            find ./downloaded-artifact -type f >&2 || true
            exit 1
          fi

          go run ./scripts/update-benchmark-readme \
            --artifact "$artifact" \
            --readme README.md \
            --profile clawhub \
            --workflow-url "$WORKFLOW_URL" \
            --commit "$(git rev-parse --short HEAD)" | tee /tmp/clawhub-benchmark-block.md
          {
            echo "## ClawHub SkillTrustBench profile gate"
            echo
            cat /tmp/clawhub-benchmark-block.md
          } >>"$GITHUB_STEP_SUMMARY"

      - name: Commit README update
        if: ${{ inputs.commit_readme == 'true' }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "README benchmark block already up to date."
            exit 0
          fi
          git commit -m "docs: update clawhub SkillTrustBench benchmark"
          git push
