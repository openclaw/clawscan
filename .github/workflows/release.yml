name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Tag name to use when publishing a manual release.
        required: false
        type: string
      publish:
        description: Publish a GitHub Release instead of only building artifacts.
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: 24

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.version.outputs.checkout_ref }}
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Resolve release version
        id: version
        run: |
          version="${GITHUB_REF_NAME}"
          checkout_ref="${GITHUB_REF}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${{ inputs.tag }}"
            if [ -n "$version" ]; then
              checkout_ref="$version"
            elif [ "${{ inputs.publish }}" = "true" ]; then
              echo "Manual publishing requires the tag input."
              exit 1
            else
              version="manual-${GITHUB_RUN_NUMBER}"
            fi
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$checkout_ref" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ steps.version.outputs.checkout_ref }}

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release artifacts
        run: make release VERSION="${{ steps.version.outputs.value }}"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: clawscan-${{ steps.version.outputs.value }}-release
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || inputs.publish
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.build.outputs.version }}
        run: |
          gh release create "$RELEASE_TAG" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$RELEASE_TAG" \
            --generate-notes

  publish-npm:
    name: Publish @openclaw/clawscan
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || inputs.publish
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.build.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - name: Validate package metadata
        run: |
          node <<'NODE'
          const { readFileSync } = require("node:fs");

          const pkg = JSON.parse(readFileSync("npm/clawscan/package.json", "utf8"));
          const expectedName = "@openclaw/clawscan";
          const expectedRepo = "https://github.com/openclaw/clawscan";
          const repository = typeof pkg.repository === "string"
            ? pkg.repository
            : pkg.repository?.url;
          const normalize = (value) =>
            String(value ?? "")
              .trim()
              .replace(/^git\+/, "")
              .replace(/\.git$/i, "")
              .replace(/\/+$/, "");

          const errors = [];
          if (pkg.name !== expectedName) {
            errors.push(`package name must be ${expectedName}; found ${pkg.name ?? "<missing>"}`);
          }
          if (normalize(repository) !== expectedRepo) {
            errors.push(`repository URL must be ${expectedRepo}; found ${normalize(repository) || "<missing>"}`);
          }
          if (pkg.private === true) {
            errors.push("package must not be private");
          }
          if (errors.length > 0) {
            for (const error of errors) console.error(error);
            process.exit(1);
          }
          NODE

      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin main

          node --input-type=module <<'NODE'
          import { execFileSync } from "node:child_process";
          const { normalizePackageVersion } = await import("./scripts/build-npm-package.mjs");

          const releaseTag = process.env.RELEASE_TAG ?? "";
          const releaseSha = execFileSync("git", ["rev-parse", "HEAD"], { encoding: "utf8" }).trim();

          if (!/^v\d+\.\d+\.\d+$/.test(releaseTag)) {
            throw new Error(`release tag must match vX.Y.Z; received ${releaseTag || "<missing>"}`);
          }
          normalizePackageVersion(releaseTag);
          execFileSync("git", ["merge-base", "--is-ancestor", releaseSha, "origin/main"]);
          NODE

      - name: Ensure version is unpublished
        env:
          RELEASE_TAG: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          package_name="$(node -p "require('./npm/clawscan/package.json').name")"
          package_version="$(node --input-type=module -e 'import { normalizePackageVersion } from "./scripts/build-npm-package.mjs"; process.stdout.write(normalizePackageVersion(process.env.RELEASE_TAG));')"
          set +e
          output="$(npm view "${package_name}@${package_version}" version 2>&1)"
          status=$?
          set -e
          if [ "${status}" -eq 0 ]; then
            echo "${package_name}@${package_version} is already published."
            exit 1
          fi
          if ! printf '%s\n' "${output}" | grep -q "E404"; then
            printf '%s\n' "${output}" >&2
            exit "${status}"
          fi

      - name: Check npm package
        run: |
          node --test npm/clawscan/test/*.test.mjs
          node --test scripts/build-npm-package.test.mjs
          node scripts/build-npm-package.mjs --version "${{ needs.build.outputs.version }}" --pack --smoke

      - name: Stage npm package
        run: node scripts/build-npm-package.mjs --version "${{ needs.build.outputs.version }}"

      - name: Publish with npm trusted publishing
        run: npm publish dist/npm/package --access public --provenance

  update-homebrew-tap:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs:
      - build
      - publish
      - publish-npm
    if: always() && needs.publish.result == 'success' && needs.publish-npm.result == 'success' && startsWith(needs.build.outputs.version, 'v')
    env:
      TAP_REPO: openclaw/homebrew-tap
      FORMULA: clawscan
      DESCRIPTION: Agent-skill security scanner harness for ClawHub
    steps:
      - name: Dispatch tap formula update
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail

          export GH_TOKEN="${HOMEBREW_TAP_TOKEN:-${HOMEBREW_TAP_GITHUB_TOKEN:-}}"
          if [ -z "${GH_TOKEN}" ]; then
            echo "::warning::Homebrew tap update skipped; set HOMEBREW_TAP_TOKEN with workflow access to ${TAP_REPO}."
            exit 0
          fi

          if ! can_push="$(gh api "repos/${TAP_REPO}" --jq '.permissions.push // false')"; then
            echo "::warning::Homebrew tap update skipped; token cannot access ${TAP_REPO}."
            exit 0
          fi
          if [ "${can_push}" != "true" ]; then
            echo "::warning::Homebrew tap update skipped; token needs push access to ${TAP_REPO}."
            exit 0
          fi

          request_id="${FORMULA}-${RELEASE_TAG}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          expected_title="Update ${FORMULA} for ${RELEASE_TAG} (${request_id})"

          gh workflow run update-formula.yml \
            --repo "${TAP_REPO}" \
            --ref main \
            -f formula="${FORMULA}" \
            -f tag="${RELEASE_TAG}" \
            -f repository="${GITHUB_REPOSITORY}" \
            -f description="${DESCRIPTION}" \
            -f artifact_template="{formula}_{tag}_{target}.tar.gz" \
            -f request_id="${request_id}"

          run_id=""
          for _ in {1..30}; do
            run_id=$(gh run list \
              --repo "${TAP_REPO}" \
              --workflow update-formula.yml \
              --branch main \
              --event workflow_dispatch \
              --limit 20 \
              --json databaseId,displayTitle \
              --jq ".[] | select(.displayTitle == \"${expected_title}\") | .databaseId" | head -n1)
            if [ -n "${run_id}" ]; then
              break
            fi
            sleep 5
          done

          if [ -z "${run_id}" ]; then
            echo "::error::Could not find tap workflow run with title: ${expected_title}"
            exit 1
          fi

          gh run watch "${run_id}" \
            --repo "${TAP_REPO}" \
            --exit-status \
            --interval 10
