name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Tag name to use when publishing a manual release.
        required: false
        type: string
      publish:
        description: Publish a GitHub Release instead of only building artifacts.
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Resolve release version
        id: version
        run: |
          version="${GITHUB_REF_NAME}"
          checkout_ref="${GITHUB_REF}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${{ inputs.tag }}"
            if [ -n "$version" ]; then
              checkout_ref="$version"
            elif [ "${{ inputs.publish }}" = "true" ]; then
              echo "Manual publishing requires the tag input."
              exit 1
            else
              version="manual-${GITHUB_RUN_NUMBER}"
            fi
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$checkout_ref" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.version.outputs.checkout_ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release artifacts
        run: make release VERSION="${{ steps.version.outputs.value }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawscan-${{ steps.version.outputs.value }}-release
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || inputs.publish
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.build.outputs.version }}
        run: |
          gh release create "$RELEASE_TAG" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$RELEASE_TAG" \
            --generate-notes

  update-homebrew-tap:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs:
      - build
      - publish
    if: always() && needs.publish.result == 'success' && startsWith(needs.build.outputs.version, 'v')
    env:
      TAP_REPO: openclaw/homebrew-tap
      FORMULA: clawscan
      DESCRIPTION: Agent-skill security scanner harness for ClawHub
    steps:
      - name: Dispatch tap formula update
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail

          export GH_TOKEN="${HOMEBREW_TAP_TOKEN:-${HOMEBREW_TAP_GITHUB_TOKEN:-}}"
          if [ -z "${GH_TOKEN}" ]; then
            echo "::warning::Homebrew tap update skipped; set HOMEBREW_TAP_TOKEN with workflow access to ${TAP_REPO}."
            exit 0
          fi

          if ! can_push="$(gh api "repos/${TAP_REPO}" --jq '.permissions.push // false')"; then
            echo "::warning::Homebrew tap update skipped; token cannot access ${TAP_REPO}."
            exit 0
          fi
          if [ "${can_push}" != "true" ]; then
            echo "::warning::Homebrew tap update skipped; token needs push access to ${TAP_REPO}."
            exit 0
          fi

          request_id="${FORMULA}-${RELEASE_TAG}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          expected_title="Update ${FORMULA} for ${RELEASE_TAG} (${request_id})"

          gh workflow run update-formula.yml \
            --repo "${TAP_REPO}" \
            --ref main \
            -f formula="${FORMULA}" \
            -f tag="${RELEASE_TAG}" \
            -f repository="${GITHUB_REPOSITORY}" \
            -f description="${DESCRIPTION}" \
            -f artifact_template="{formula}_{tag}_{target}.tar.gz" \
            -f request_id="${request_id}"

          run_id=""
          for _ in {1..30}; do
            run_id=$(gh run list \
              --repo "${TAP_REPO}" \
              --workflow update-formula.yml \
              --branch main \
              --event workflow_dispatch \
              --limit 20 \
              --json databaseId,displayTitle \
              --jq ".[] | select(.displayTitle == \"${expected_title}\") | .databaseId" | head -n1)
            if [ -n "${run_id}" ]; then
              break
            fi
            sleep 5
          done

          if [ -z "${run_id}" ]; then
            echo "::error::Could not find tap workflow run with title: ${expected_title}"
            exit 1
          fi

          gh run watch "${run_id}" \
            --repo "${TAP_REPO}" \
            --exit-status \
            --interval 10
